version: '3.8'

services:
  os-go-server:
    build: .
    ports:
      - "8765:8765"
    environment:
      - WS_HOST=0.0.0.0
      - WS_PORT=8765
      - MAX_ROOMS=100
      - LOG_LEVEL=info
    restart: unless-stopped
    
  # Optional: Redis for scaling
